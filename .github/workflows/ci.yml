# Helix CI — build, unit suite, and a differential-fuzz smoke on every push/PR.
# Makes the "0 mismatches" claim reproducible off one machine. VS is located at runtime
# via vswhere (helix/find-vcvars.ps1), so no toolchain path is hardcoded.
name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-test-fuzz:
    runs-on: windows-2022
    timeout-minutes: 30
    defaults:
      run:
        shell: powershell          # Windows PowerShell 5.1, what the scripts target
        working-directory: helix
    steps:
      - uses: actions/checkout@v4
      - name: Locate MSVC (vswhere)
        run: . ./find-vcvars.ps1; "Using: $(Find-VcVars)"
      - name: Build, test, and smoke-fuzz
        run: ./ci.ps1

  # Longer fuzz campaign on demand (not gating PRs).
  nightly-fuzz:
    if: github.event_name == 'workflow_dispatch'
    runs-on: windows-2022
    timeout-minutes: 120
    defaults:
      run:
        shell: powershell
        working-directory: helix
    steps:
      - uses: actions/checkout@v4
      - name: Extended differential fuzz
        run: |
          ./ci.ps1
          foreach ($s in 11,22,33,44) { ./build/fuzz_imp.exe $s 20000 | Select-String 'mismatches' }
          foreach ($s in 11,22)       { ./build/fuzz_cf.exe  $s 15000 | Select-String 'mismatches' }
